server:
  host: 0.0.0.0
  port: 8080
  read_timeout: 10s
  write_timeout: 10s

game:
  tick_rate: 60
  max_players: 1000
  max_rooms: 100
  default_room_size: 10
  map_size: 100.0
  spawn_distance: 10.0

redis:
  enabled: true
  addr: "redis:6379"
  db: 0

log:
  level: info
  format: json

metrics:
  enabled: true
  port: "9090"
