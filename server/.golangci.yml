version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - revive

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  govet:
    check-shadowing: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
    - path: internal/game/
      linters:
        - gosec
      text: "weak random"

  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
