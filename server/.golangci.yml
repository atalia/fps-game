version: "2"
run:
  tests: true
linters:
  settings:
    staticcheck:
      checks:
        - -QF1008
        - -SA1019
        - -SA4000
        - -SA5011
        - -SA9003
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - errcheck
        text: os\.(Unsetenv|Remove|RemoveAll|Setenv)
      - linters:
          - errcheck
        text: Close\(\)
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
