version: '3.8'

services:
  # 游戏服务器
  game-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fps-game-server
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - REDIS_ENABLED=true
      - REDIS_ADDR=redis:6379
      - GAME_TICK_RATE=60
      - GAME_MAX_PLAYERS=1000
      - GAME_MAX_ROOMS=100
      - LOG_LEVEL=info
      - METRICS_ENABLED=true
      - METRICS_PORT=9090
      - CLIENT_PATH=/app/client
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: fps-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - fps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # Nginx 反向代理 (生产环境)
  nginx:
    image: nginx:alpine
    container_name: fps-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - game-server
    networks:
      - fps-network
    restart: unless-stopped
    profiles:
      - production

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:latest
    container_name: fps-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - fps-network
    restart: unless-stopped
    profiles:
      - monitoring

  # Grafana 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: fps-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - fps-network
    restart: unless-stopped
    profiles:
      - monitoring

networks:
  fps-network:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
