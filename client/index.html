<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FPS Game - 多人对战</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: #1a1a2e;
        color: #eee;
        overflow: hidden;
      }

      #game-container {
        width: 100vw;
        height: 100vh;
        position: relative;
      }

      /* HUD */
      #hud {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        pointer-events: none;
        z-index: 100;
      }

      /* 血量条 */
      #health-bar {
        width: 200px;
        height: 20px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 10px;
        overflow: hidden;
      }

      #health-fill {
        height: 100%;
        background: linear-gradient(90deg, #ff4444, #ff6666);
        transition: width 0.3s;
      }

      #health-text {
        position: absolute;
        left: 10px;
        top: 5px;
        font-size: 12px;
        text-shadow: 1px 1px 2px #000;
      }

      /* 护甲条 */
      #armor-bar {
        width: 200px;
        height: 16px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 8px;
        overflow: hidden;
        margin-top: 4px;
      }

      #armor-fill {
        height: 100%;
        background: linear-gradient(90deg, #4a90d9, #6bb3ff);
        transition: width 0.3s;
      }

      #armor-text {
        position: absolute;
        left: 10px;
        top: 3px;
        font-size: 11px;
        text-shadow: 1px 1px 2px #000;
      }

      /* 弹药 */
      #ammo-display {
        background: rgba(0, 0, 0, 0.5);
        padding: 10px 20px;
        border-radius: 5px;
        text-align: right;
      }

      #money-amount {
        font-size: 22px;
        font-weight: 800;
        color: #7cff9a;
        letter-spacing: 0.04em;
        margin-bottom: 4px;
      }

      #ammo-count {
        font-size: 28px;
        font-weight: bold;
      }

      #ammo-reserve {
        font-size: 14px;
        color: #aaa;
      }

      #current-weapon {
        font-size: 12px;
        color: #888;
        margin-top: 5px;
      }

      #round-panel {
        min-width: 240px;
        padding: 10px 16px 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: linear-gradient(
          180deg,
          rgba(8, 10, 14, 0.9),
          rgba(14, 18, 24, 0.82)
        );
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      }

      #round-number {
        font-size: 12px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #aeb8c5;
      }

      #round-score {
        margin-top: 6px;
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 0.08em;
        color: #f3f6fb;
      }

      #round-timer {
        margin-top: 4px;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 0.08em;
        color: #ffdf8b;
      }

      #round-phase {
        margin-top: 4px;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #7cff9a;
      }

      /* 准星 */
      #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 30px;
        height: 30px;
        pointer-events: none;
      }

      #crosshair::before,
      #crosshair::after {
        content: "";
        position: absolute;
        background: rgba(255, 255, 255, 0.8);
      }

      #crosshair::before {
        width: 2px;
        height: 20px;
        left: 14px;
        top: 5px;
      }

      #crosshair::after {
        width: 20px;
        height: 2px;
        left: 5px;
        top: 14px;
      }

      /* 记分板 */
      #scoreboard {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.85);
        padding: 20px;
        border-radius: 10px;
        display: none;
        min-width: 400px;
        z-index: 200;
      }

      #scoreboard.visible {
        display: block;
      }

      #scoreboard h2 {
        text-align: center;
        margin-bottom: 15px;
        color: #fff;
      }

      #scoreboard-team-summary {
        text-align: center;
        margin-bottom: 10px;
        font-size: 14px;
      }

      .score-row {
        display: flex;
        justify-content: space-between;
        padding: 8px 15px;
        border-bottom: 1px solid #333;
      }

      .score-row.header {
        background: #333;
        font-weight: bold;
      }

      /* 小地图 */
      #minimap {
        position: absolute;
        bottom: 20px;
        right: 20px;
        width: 150px;
        height: 150px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 5px;
        border: 2px solid #444;
        z-index: 100;
      }

      #minimap-canvas {
        width: 100%;
        height: 100%;
      }

      /* 聊天 */
      #chat-container {
        position: absolute;
        bottom: 20px;
        left: 20px;
        width: 300px;
        z-index: 100;
      }

      #chat-messages {
        height: 150px;
        overflow-y: auto;
        background: rgba(0, 0, 0, 0.3);
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 5px;
      }

      .chat-message {
        font-size: 12px;
        margin-bottom: 3px;
      }

      .chat-message .name {
        color: #4fc3f7;
      }

      #chat-input {
        width: 100%;
        padding: 8px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid #444;
        border-radius: 5px;
        color: #fff;
        font-size: 14px;
      }

      #chat-input:focus {
        outline: none;
        border-color: #4fc3f7;
      }

      /* 击杀信息 */
      #kill-feed {
        position: absolute;
        top: 60px;
        right: 20px;
        width: 250px;
        z-index: 100;
      }

      .kill-item {
        background: rgba(0, 0, 0, 0.5);
        padding: 5px 10px;
        margin-bottom: 5px;
        border-radius: 3px;
        font-size: 12px;
        animation: fadeOut 3s forwards;
      }

      @keyframes fadeOut {
        0% {
          opacity: 1;
        }
        70% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      /* 房间信息 */
      #room-info {
        position: absolute;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        padding: 10px 20px;
        border-radius: 5px;
        text-align: center;
        z-index: 100;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      #room-id {
        font-size: 14px;
        color: #00ff88;
        font-weight: bold;
        margin-bottom: 5px;
      }

      #player-count {
        font-size: 12px;
        color: #aaa;
      }

      /* 玩家列表 */
      #player-list {
        position: absolute;
        top: 15px;
        right: 15px;
        background: rgba(0, 0, 0, 0.7);
        padding: 10px;
        border-radius: 5px;
        min-width: 150px;
        max-height: 300px;
        overflow-y: auto;
        z-index: 100;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .player-list-header {
        font-size: 12px;
        color: #888;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 5px;
        margin-bottom: 5px;
      }

      .player-item {
        display: flex;
        align-items: center;
        padding: 5px 0;
        font-size: 13px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .player-item:last-child {
        border-bottom: none;
      }

      .player-item.self {
        color: #00ff88;
        font-weight: bold;
      }

      .player-item.bot {
        color: #ffaa00;
      }

      .player-item .name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .player-item .kills {
        color: #ff4444;
        font-size: 11px;
        margin-left: 8px;
      }

      .player-item .health {
        color: #44ff44;
        font-size: 11px;
        margin-left: 5px;
      }

      /* 伤害闪烁 */
      #damage-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 50;
      }

      #damage-overlay.hit {
        background: radial-gradient(
          ellipse at center,
          transparent 50%,
          rgba(255, 0, 0, 0.3) 100%
        );
        animation: damageFlash 0.3s;
      }

      #damage-overlay.kill {
        background: radial-gradient(
          ellipse at center,
          transparent 50%,
          rgba(0, 255, 0, 0.3) 100%
        );
        animation: killFlash 0.5s;
      }

      #damage-overlay.death {
        background: rgba(0, 0, 0, 0.8);
      }

      @keyframes damageFlash {
        0% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      @keyframes killFlash {
        0% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      /* 消息提示 */
      #message-center {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translateX(-50%);
        font-size: 24px;
        font-weight: bold;
        text-shadow: 2px 2px 4px #000;
        z-index: 100;
        text-align: center;
      }

      /* 武器选择提示 */
      #weapon-hint {
        position: absolute;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.5);
        padding: 10px 20px;
        border-radius: 5px;
        font-size: 12px;
        color: #888;
        z-index: 100;
      }

      /* 加载画面 */
      #loading {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #1a1a2e;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      #loading h1 {
        font-size: 48px;
        margin-bottom: 20px;
      }

      #loading p {
        color: #888;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid #333;
        border-top-color: #4fc3f7;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 20px 0;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- 加载画面 -->
    <div id="loading">
      <h1>🎮 FPS Game</h1>
      <div class="spinner"></div>
      <p>连接服务器中...</p>
    </div>

    <!-- 游戏容器 -->
    <div id="game-container"></div>

    <!-- HUD -->
    <div id="hud">
      <div style="position: relative">
        <div id="health-bar">
          <div id="health-fill" style="width: 100%"></div>
          <span id="health-text">100 HP</span>
        </div>
        <div id="armor-bar" style="display: none">
          <div id="armor-fill" style="width: 100%"></div>
          <span id="armor-text">🛡️ 100</span>
        </div>
      </div>

      <div id="room-info">
        <div id="room-id">等待加入...</div>
        <div id="player-count">玩家: 0/10</div>
        <button
          id="leave-room-btn"
          style="
            margin-top: 8px;
            padding: 5px 15px;
            background: rgba(255, 68, 68, 0.8);
            border: none;
            border-radius: 3px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            display: none;
          "
        >
          退出房间
        </button>
      </div>

      <div id="round-panel">
        <div id="round-number">Round 1/30</div>
        <div id="round-score">CT 0 - 0 T</div>
        <div id="round-timer">00:00</div>
        <div id="round-phase">WARMUP</div>
      </div>

      <!-- 玩家列表 -->
      <div id="player-list">
        <div class="player-list-header">房间玩家</div>
        <div id="players-container"></div>
      </div>

      <div id="ammo-display">
        <div id="money-amount">$0</div>
        <div id="ammo-count">30</div>
        <div id="ammo-reserve">/ 90</div>
        <div id="current-weapon">RIFLE</div>
      </div>
    </div>

    <!-- 准星 -->
    <div id="crosshair"></div>

    <!-- 小地图 -->
    <div id="minimap">
      <canvas id="minimap-canvas"></canvas>
    </div>

    <!-- 聊天 -->
    <div id="chat-container">
      <div id="chat-messages"></div>
      <input type="text" id="chat-input" placeholder="按 Enter 发送消息..." />
    </div>

    <!-- 击杀信息 -->
    <div id="kill-feed"></div>

    <!-- 记分板 -->
    <div id="scoreboard">
      <h2>记分板</h2>
      <div id="scoreboard-team-summary"></div>
      <div class="score-row header">
        <span>玩家</span>
        <span>队伍</span>
        <span>击杀</span>
        <span>死亡</span>
        <span>分数</span>
      </div>
      <div id="scoreboard-rows"></div>
    </div>

    <!-- 伤害覆盖层 -->
    <div id="damage-overlay"></div>

    <!-- 消息中心 -->
    <div id="message-center"></div>

    <!-- 武器提示 -->
    <div id="weapon-hint">
      [1] 队伍手枪 | [2] 主步枪 | [3] 次步枪 | [4] AWP | [5] Deagle | [R] 换弹 |
      [B] 购买菜单 | [N] 添加机器人 | [Tab] 记分板
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      // 确保 Three.js 加载
      if (typeof THREE === "undefined") {
        document.getElementById("loading").innerHTML =
          "<h1>❌ Three.js 加载失败</h1><p>请检查网络连接</p>";
        throw new Error("Three.js not loaded");
      }
      console.log("✅ Three.js loaded:", THREE.REVISION);
    </script>

    <!-- 游戏模块 -->
    <script src="/js/renderer.js?v=8a00471"></script>
    <script src="/js/player.js"></script>
    <script src="/js/network.js"></script>
    <script src="/js/audio.js"></script>
    <!-- Effects System -->
    <script src="/js/effects/performance.js?v=0a04e88"></script>
    <script src="/js/effects/core.js?v=0a04e88"></script>
    <script src="/js/effects/damage-number.js?v=0a04e88"></script>
    <script src="/js/effects/health-bar.js?v=0a04e88"></script>
    <script src="/js/effects/hit-indicator.js?v=0a04e88"></script>
    <script src="/js/effects/kill-notice.js?v=0a04e88"></script>
    <script src="/js/effects/killstreak.js?v=0a04e88"></script>
    <script src="/js/effects/achievements.js?v=0a04e88"></script>
    <script src="/js/effects/screen-effects.js?v=0a04e88"></script>
    <script src="/js/effects/crosshair.js?v=0a04e88"></script>
    <script src="/js/effects/ammo-display.js?v=0a04e88"></script>
    <script src="/js/effects/map-enhanced.js?v=0a04e88"></script>
    <script src="/js/effects/index.js?v=0a04e88"></script>
    <script src="/js/effects.js?v=0a04e88"></script>
    <script src="/js/damage-display.js"></script>
    <script src="/js/hit-effects.js"></script>
    <script src="/js/ai-labels.js"></script>
    <script src="/js/powerups.js"></script>
    <script src="/js/spectator.js"></script>
    <script src="/js/skills.js"></script>
    <script src="/js/maps.js"></script>
    <script src="/js/minimap.js"></script>
    <script src="/js/radar.js"></script>
    <script src="/js/replay.js"></script>
    <script src="/js/emotes.js"></script>
    <script src="/js/weapons.js"></script>
    <script src="/js/team.js"></script>
    <script src="/js/killstreak.js"></script>
    <script src="/js/gamemodes.js"></script>
    <script src="/js/voice.js"></script>
    <script src="/js/achievements.js"></script>
    <script src="/js/social.js"></script>
    <script src="/js/economy.js"></script>
    <script src="/js/grenades.js"></script>
    <script src="/js/ping.js"></script>
    <script src="/js/ranked.js"></script>
    <script src="/js/c4.js"></script>
    <script src="/js/match-end.js"></script>
    <script src="/js/tutorial.js"></script>
    <script src="/js/notifications.js"></script>
    <script src="/js/settings.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/killfeed.js"></script>
    <script src="/js/scoreboard.js"></script>
    <script src="/js/game-loop.js"></script>
    <script src="/js/lobby.js"></script>
    <script src="/js/radio.js?v=1"></script>
    <script src="/js/game.js?v=8a00471"></script>
    <script src="/js/message-handlers.js"></script>
    <script src="/js/main.js?v=8a00471"></script>

    <!-- 全局错误处理 -->
    <script>
      // 捕获全局错误
      window.onerror = function (msg, url, line, col, error) {
        const loading = document.getElementById("loading");
        if (loading) {
          loading.innerHTML = `
                    <h1>❌ JavaScript 错误</h1>
                    <p style="color: #ff6b6b; margin: 10px 0;">${msg}</p>
                    <p style="color: #888; font-size: 12px;">${url}:${line}:${col}</p>
                    <p style="margin-top: 20px">
                        <button onclick="location.reload()" style="
                            padding: 12px 24px; 
                            font-size: 16px; 
                            cursor: pointer;
                            background: #4CAF50;
                            color: white;
                            border: none;
                            border-radius: 5px;
                        ">🔄 重试</button>
                    </p>
                `;
        }
        console.error("Global error:", msg, url, line, col, error);
        return true;
      };

      // 捕获未处理的 Promise 拒绝
      window.onunhandledrejection = function (event) {
        const loading = document.getElementById("loading");
        if (loading) {
          loading.innerHTML = `
                    <h1>❌ 异步错误</h1>
                    <p style="color: #ff6b6b; margin: 10px 0;">${event.reason}</p>
                    <p style="margin-top: 20px">
                        <button onclick="location.reload()" style="
                            padding: 12px 24px; 
                            font-size: 16px; 
                            cursor: pointer;
                            background: #4CAF50;
                            color: white;
                            border: none;
                            border-radius: 5px;
                        ">🔄 重试</button>
                    </p>
                `;
        }
        console.error("Unhandled rejection:", event.reason);
      };
    </script>
  </body>
</html>
