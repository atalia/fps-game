<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Game - 多人对战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #1a1a2e;
            color: #eee;
            overflow: hidden;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 100;
        }

        /* 血量条 */
        #health-bar {
            width: 200px;
            height: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
        }

        #health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff6666);
            transition: width 0.3s;
        }

        #health-text {
            position: absolute;
            left: 10px;
            top: 5px;
            font-size: 12px;
            text-shadow: 1px 1px 2px #000;
        }

        /* 弹药 */
        #ammo-display {
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 5px;
            text-align: right;
        }

        #ammo-count {
            font-size: 28px;
            font-weight: bold;
        }

        #ammo-reserve {
            font-size: 14px;
            color: #aaa;
        }

        #current-weapon {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        /* 准星 */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            pointer-events: none;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.8);
        }

        #crosshair::before {
            width: 2px;
            height: 20px;
            left: 14px;
            top: 5px;
        }

        #crosshair::after {
            width: 20px;
            height: 2px;
            left: 5px;
            top: 14px;
        }

        /* 记分板 */
        #scoreboard {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            padding: 20px;
            border-radius: 10px;
            display: none;
            min-width: 400px;
            z-index: 200;
        }

        #scoreboard.visible {
            display: block;
        }

        #scoreboard h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #fff;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 15px;
            border-bottom: 1px solid #333;
        }

        .score-row.header {
            background: #333;
            font-weight: bold;
        }

        /* 小地图 */
        #minimap {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0,0,0,0.5);
            border-radius: 5px;
            border: 2px solid #444;
            z-index: 100;
        }

        #minimap-canvas {
            width: 100%;
            height: 100%;
        }

        /* 聊天 */
        #chat-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 300px;
            z-index: 100;
        }

        #chat-messages {
            height: 150px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 5px;
        }

        .chat-message {
            font-size: 12px;
            margin-bottom: 3px;
        }

        .chat-message .name {
            color: #4fc3f7;
        }

        #chat-input {
            width: 100%;
            padding: 8px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #444;
            border-radius: 5px;
            color: #fff;
            font-size: 14px;
        }

        #chat-input:focus {
            outline: none;
            border-color: #4fc3f7;
        }

        /* 击杀信息 */
        #kill-feed {
            position: absolute;
            top: 60px;
            right: 20px;
            width: 250px;
            z-index: 100;
        }

        .kill-item {
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            margin-bottom: 5px;
            border-radius: 3px;
            font-size: 12px;
            animation: fadeOut 3s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* 房间信息 */
        #room-info {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 5px;
            text-align: center;
            z-index: 100;
        }

        /* 伤害闪烁 */
        #damage-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 50;
        }

        #damage-overlay.hit {
            background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0.3) 100%);
            animation: damageFlash 0.3s;
        }

        #damage-overlay.kill {
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,255,0,0.3) 100%);
            animation: killFlash 0.5s;
        }

        #damage-overlay.death {
            background: rgba(0,0,0,0.8);
        }

        @keyframes damageFlash {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes killFlash {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* 消息提示 */
        #message-center {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            z-index: 100;
            text-align: center;
        }

        /* 武器选择提示 */
        #weapon-hint {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 12px;
            color: #888;
            z-index: 100;
        }

        /* 加载画面 */
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #loading h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        #loading p {
            color: #888;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-top-color: #4fc3f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 加载画面 -->
    <div id="loading">
        <h1>🎮 FPS Game</h1>
        <div class="spinner"></div>
        <p>连接服务器中...</p>
    </div>

    <!-- 游戏容器 -->
    <div id="game-container"></div>

    <!-- HUD -->
    <div id="hud">
        <div style="position: relative;">
            <div id="health-bar">
                <div id="health-fill" style="width: 100%"></div>
            </div>
            <span id="health-text">100 HP</span>
        </div>

        <div id="room-info">
            <div id="room-id">等待加入...</div>
            <div id="player-count">玩家: 0/10</div>
        </div>

        <div id="ammo-display">
            <div id="ammo-count">30</div>
            <div id="ammo-reserve">/ 90</div>
            <div id="current-weapon">RIFLE</div>
        </div>
    </div>

    <!-- 准星 -->
    <div id="crosshair"></div>

    <!-- 小地图 -->
    <div id="minimap">
        <canvas id="minimap-canvas"></canvas>
    </div>

    <!-- 聊天 -->
    <div id="chat-container">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="按 Enter 发送消息..." />
    </div>

    <!-- 击杀信息 -->
    <div id="kill-feed"></div>

    <!-- 记分板 -->
    <div id="scoreboard">
        <h2>记分板</h2>
        <div class="score-row header">
            <span>玩家</span>
            <span>击杀</span>
            <span>死亡</span>
            <span>分数</span>
        </div>
        <div id="scoreboard-rows"></div>
    </div>

    <!-- 伤害覆盖层 -->
    <div id="damage-overlay"></div>

    <!-- 消息中心 -->
    <div id="message-center"></div>

    <!-- 武器提示 -->
    <div id="weapon-hint">
        [1] 手枪 | [2] 步枪 | [3] 霰弹枪 | [4] 狙击枪 | [R] 换弹 | [Tab] 记分板
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- 游戏模块 -->
    <script src="/js/renderer.js"></script>
    <script src="/js/player.js"></script>
    <script src="/js/network.js"></script>
    <script src="/js/audio.js"></script>
    <script src="/js/effects.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/game.js"></script>

    <script>
        // 初始化游戏
        async function init() {
            const loading = document.getElementById('loading');

            try {
                // 初始化音效
                window.audioManager = new AudioManager();
                await window.audioManager.init();

                // 初始化 UI
                window.uiManager = new UIManager();
                window.screenEffects = new ScreenEffects();

                // 初始化渲染器
                window.renderer = new Renderer('game-container');

                // 初始化网络
                const wsUrl = `ws://${window.location.host}/ws`;
                window.network = new Network(wsUrl);

                // 等待连接
                await new Promise((resolve, reject) => {
                    window.network.onConnect = resolve;
                    window.network.onError = reject;
                    setTimeout(() => reject(new Error('连接超时')), 5000);
                });

                // 初始化游戏
                window.game = new Game();
                await window.game.init();

                // 隐藏加载画面
                loading.style.display = 'none';

                // 自动加入游戏
                window.network.send('join_room', {
                    room_id: '',
                    name: 'Player_' + Math.random().toString(36).substr(2, 4)
                });

                console.log('🎮 Game initialized successfully!');

            } catch (error) {
                console.error('初始化失败:', error);
                loading.innerHTML = `
                    <h1>❌ 连接失败</h1>
                    <p>${error.message}</p>
                    <p style="margin-top: 20px">
                        <button onclick="location.reload()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">
                            重试
                        </button>
                    </p>
                `;
            }
        }

        // 启动
        init();
    </script>
</body>
</html>
