name: Auto Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

jobs:
  ci:
    name: CI Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache-dependency-path: server/go.sum

    - name: Backend tests
      run: |
        cd server
        go test -v -race ./...

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache-dependency-path: client/package-lock.json

    - name: Frontend tests
      run: |
        cd client
        npm ci
        npm test -- --run

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: success()
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        port: ${{ secrets.DEPLOY_PORT }}
        key: ${{ secrets.DEPLOY_KEY }}
        script: |
          set -e
          cd ${{ secrets.DEPLOY_PATH }}
          git fetch origin main
          git reset --hard origin/main
          bash scripts/deploy-prod.sh --skip-precheck

    - name: Health check
      run: |
        sleep 10
        curl -sf http://${{ secrets.DEPLOY_HOST }}:8080/api/health || exit 1

  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production
    
    steps:
    - name: Rollback
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        port: ${{ secrets.DEPLOY_PORT }}
        key: ${{ secrets.DEPLOY_KEY }}
        script: |
          cd ${{ secrets.DEPLOY_PATH }}
          git reset --hard HEAD~1
          bash scripts/deploy-prod.sh --skip-precheck
