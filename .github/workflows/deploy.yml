name: Auto Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

jobs:
  # ================================
  # CI 检查 (复用)
  # ================================
  ci:
    name: CI Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run pre-deploy checks
      run: |
        chmod +x scripts/pre-deploy-check.sh
        ./scripts/pre-deploy-check.sh

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache-dependency-path: server/go.sum

    - name: Backend tests
      run: |
        cd server
        go test -v -race ./...

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache-dependency-path: client/package-lock.json

    - name: Frontend tests
      run: |
        cd client
        npm ci
        npm test -- --run

  # ================================
  # 部署到服务器
  # ================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    if: success()
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        port: ${{ secrets.SERVER_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          set -e
          
          cd ~/projects/fps-game
          
          echo "📥 Pulling latest code..."
          git fetch origin main
          git reset --hard origin/main
          
          echo "🔍 Current commit:"
          git log --oneline -1
          
          echo "🛑 Stopping old containers..."
          docker compose --profile production down || true
          
          echo "🚀 Building and starting..."
          docker compose --profile production build --no-cache game-server
          docker compose --profile production up -d
          
          echo "⏳ Waiting for service to be ready..."
          sleep 5
          
          echo "📊 Service status:"
          docker compose --profile production ps
          
          echo "📋 Recent logs:"
          docker logs fps-game-server --tail 10

    - name: Health check
      run: |
        echo "🏥 Checking health..."
        sleep 10
        
        # 使用 HTTP 而不是 HTTPS
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.SERVER_HOST }}:8080/api/health || echo "000")
        
        if [ "$HTTP_CODE" == "200" ]; then
          echo "✅ Health check passed"
        else
          echo "❌ Health check failed (HTTP $HTTP_CODE)"
          exit 1
        fi

    - name: Notify deployment
      if: always()
      run: |
        echo "## Deployment Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Environment:** production" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🌐 Game URL: http://101.33.117.73:8080" >> $GITHUB_STEP_SUMMARY

  # ================================
  # 回滚 (手动触发)
  # ================================
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'rollback'
    environment: production
    
    steps:
    - name: Rollback to previous version
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        port: ${{ secrets.SERVER_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/projects/fps-game
          
          echo "🔄 Rolling back..."
          git reset --hard HEAD~1
          
          docker compose --profile production down
          docker compose --profile production build --no-cache game-server
          docker compose --profile production up -d
          
          echo "✅ Rollback complete!"
          
          docker logs fps-game-server --tail 10
