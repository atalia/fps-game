name: Auto Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging

jobs:
  # ================================
  # CI 检查 (复用)
  # ================================
  ci:
    name: CI Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run pre-deploy checks
      run: |
        chmod +x scripts/pre-deploy-check.sh
        ./scripts/pre-deploy-check.sh

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache-dependency-path: server/go.sum

    - name: Backend tests
      run: |
        cd server
        go test -v -race ./...

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache-dependency-path: client/package-lock.json

    - name: Frontend tests
      run: |
        cd client
        npm ci
        npm test -- --run

  # ================================
  # 部署到服务器
  # ================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    if: success()
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        port: ${{ secrets.SERVER_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/lighthouse/projects/fps-game
          
          echo "📥 Pulling latest code..."
          git pull origin main
          
          echo "🔍 Running pre-deploy checks..."
          chmod +x scripts/pre-deploy-check.sh
          ./scripts/pre-deploy-check.sh
          
          echo "🚀 Deploying..."
          make prod
          
          echo "✅ Deployment complete!"
          
          echo "📊 Service status:"
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

    - name: Health check
      run: |
        echo "🏥 Checking health..."
        sleep 10
        
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.SERVER_HOST }}:8080/api/health || echo "000")
        
        if [ "$HTTP_CODE" == "200" ]; then
          echo "✅ Health check passed"
        else
          echo "❌ Health check failed (HTTP $HTTP_CODE)"
          exit 1
        fi

    - name: Notify deployment
      if: always()
      run: |
        echo "## Deployment Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Environment:** production" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🌐 Game URL: http://101.33.117.73:8080" >> $GITHUB_STEP_SUMMARY

  # ================================
  # 回滚 (手动触发)
  # ================================
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'rollback'
    environment: production
    
    steps:
    - name: Rollback to previous version
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        port: ${{ secrets.SERVER_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/lighthouse/projects/fps-game
          
          echo "🔄 Rolling back..."
          git reset --hard HEAD~1
          make prod
          
          echo "✅ Rollback complete!"
