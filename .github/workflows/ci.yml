name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  deploy_precheck:
    name: Deploy Precheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run deploy precheck gate
        id: run_deploy_precheck
        continue-on-error: true
        run: |
          set -o pipefail
          mkdir -p .ci-artifacts
          make pre-deploy 2>&1 | tee .ci-artifacts/deploy-precheck.log

      - name: Summarize deploy precheck result
        if: always()
        run: |
          bash scripts/ci/append_failure_summary.sh \
            predeploy \
            "Deploy Precheck" \
            .ci-artifacts/deploy-precheck.log \
            "${{ steps.run_deploy_precheck.outcome }}"

      - name: Fail with deploy precheck guidance
        if: steps.run_deploy_precheck.outcome != 'success'
        run: |
          echo "::error::Deploy precheck failed. Review the blocking configuration check in the Step Summary."
          exit 1

  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: deploy_precheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: server/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Run unit test gate
        id: run_unit_tests
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p .ci-artifacts
          {
            echo "==> Install client dependencies"
            cd client
            npm ci --include=dev
            cd ..
            echo
            echo "==> Run unit tests"
            COVERAGE=1 make test-unit
          } 2>&1 | tee .ci-artifacts/unit-tests.log
        env:
          NODE_ENV: development

      - name: Summarize unit test result
        if: always()
        run: |
          bash scripts/ci/append_failure_summary.sh \
            test \
            "Unit Tests" \
            .ci-artifacts/unit-tests.log \
            "${{ steps.run_unit_tests.outcome }}"

      - name: Append coverage summary
        if: always() && steps.run_unit_tests.outcome == 'success'
        run: |
          {
            echo "#### Go Unit Coverage"
            echo
            cd server && go tool cover -func=coverage.out && cd ..
            echo
            echo "#### Frontend Unit Coverage"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          const path = 'client/coverage/coverage-summary.json';
          if (!fs.existsSync(path)) {
            console.log('coverage summary not generated');
            process.exit(0);
          }

          const report = JSON.parse(fs.readFileSync(path, 'utf8')).total;
          console.log(`- Lines: ${report.lines.pct}%`);
          console.log(`- Statements: ${report.statements.pct}%`);
          console.log(`- Functions: ${report.functions.pct}%`);
          console.log(`- Branches: ${report.branches.pct}%`);
          NODE

      - name: Upload backend coverage
        if: steps.run_unit_tests.outcome == 'success'
        uses: codecov/codecov-action@v4
        with:
          files: ./server/coverage.out
          flags: backend-unit
          name: backend-unit-coverage
          fail_ci_if_error: false

      - name: Upload frontend coverage
        if: steps.run_unit_tests.outcome == 'success'
        uses: codecov/codecov-action@v4
        with:
          files: ./client/coverage/coverage-final.json
          flags: frontend-unit
          name: frontend-unit-coverage
          fail_ci_if_error: false

      - name: Fail with unit regression guidance
        if: steps.run_unit_tests.outcome != 'success'
        run: |
          echo "::error::Unit test regression detected. Review the failing packages and specs in the Step Summary."
          exit 1

  race_detector:
    name: Race Detector
    runs-on: ubuntu-latest
    needs: deploy_precheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: server/go.sum

      - name: Run race detector gate
        id: run_race_detector
        continue-on-error: true
        run: |
          set -o pipefail
          mkdir -p .ci-artifacts
          make test-race 2>&1 | tee .ci-artifacts/race-detector.log

      - name: Summarize race detector result
        if: always()
        run: |
          bash scripts/ci/append_failure_summary.sh \
            test \
            "Race Detector" \
            .ci-artifacts/race-detector.log \
            "${{ steps.run_race_detector.outcome }}"

      - name: Fail with race detector guidance
        if: steps.run_race_detector.outcome != 'success'
        run: |
          echo "::error::Go race detector found a blocking concurrency regression. Review the Step Summary for the failing tests."
          exit 1

  integration_tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: deploy_precheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: server/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Run integration test gate
        id: run_integration_tests
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p .ci-artifacts
          {
            echo "==> Install client dependencies"
            cd client
            npm ci --include=dev
            cd ..
            echo
            echo "==> Run integration tests"
            make test-integration
          } 2>&1 | tee .ci-artifacts/integration-tests.log
        env:
          NODE_ENV: development

      - name: Summarize integration test result
        if: always()
        run: |
          bash scripts/ci/append_failure_summary.sh \
            test \
            "Integration Tests" \
            .ci-artifacts/integration-tests.log \
            "${{ steps.run_integration_tests.outcome }}"

      - name: Fail with integration regression guidance
        if: steps.run_integration_tests.outcome != 'success'
        run: |
          echo "::error::Integration test regression detected. Review the failing server/network or client/connection checks in the Step Summary."
          exit 1

  mobile_tests:
    name: Mobile Tests
    runs-on: ubuntu-latest
    needs: deploy_precheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Run mobile test gate
        id: run_mobile_tests
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p .ci-artifacts
          {
            echo "==> Install client dependencies"
            cd client
            npm ci --include=dev
            cd ..
            echo
            echo "==> Run mobile tests"
            make test-mobile
          } 2>&1 | tee .ci-artifacts/mobile-tests.log
        env:
          NODE_ENV: development

      - name: Summarize mobile test result
        if: always()
        run: |
          bash scripts/ci/append_failure_summary.sh \
            test \
            "Mobile Tests" \
            .ci-artifacts/mobile-tests.log \
            "${{ steps.run_mobile_tests.outcome }}"

      - name: Fail with mobile regression guidance
        if: steps.run_mobile_tests.outcome != 'success'
        run: |
          echo "::error::Mobile regression detected. Review the failing mobile-focused specs in the Step Summary."
          exit 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: deploy_precheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          working-directory: server
          args: --timeout=5m

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [unit_tests, race_detector, integration_tests, mobile_tests, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: fps-game:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize docker build
        run: |
          {
            echo "### Docker Build"
            echo "- Status: passed"
            echo "- Image tag: fps-game:${{ github.sha }}"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: deploy_precheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run gosec scanner
        uses: securego/gosec@master
        with:
          args: ./server/...
        continue-on-error: true

  report:
    name: CI Report
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        deploy_precheck,
        unit_tests,
        race_detector,
        integration_tests,
        mobile_tests,
        lint,
        docker,
        security,
      ]

    steps:
      - name: Generate CI report
        run: |
          {
            echo "## CI Pipeline Report"
            echo
            echo "| Gate | Status |"
            echo "|------|--------|"
            echo "| Deploy precheck | ${{ needs.deploy_precheck.result == 'success' && '✅ Pass' || '❌ Fail' }} |"
            echo "| Unit tests | ${{ needs.unit_tests.result == 'success' && '✅ Pass' || '❌ Fail' }} |"
            echo "| Race detector | ${{ needs.race_detector.result == 'success' && '✅ Pass' || '❌ Fail' }} |"
            echo "| Integration tests | ${{ needs.integration_tests.result == 'success' && '✅ Pass' || '❌ Fail' }} |"
            echo "| Mobile tests | ${{ needs.mobile_tests.result == 'success' && '✅ Pass' || '❌ Fail' }} |"
            echo "| Lint | ${{ needs.lint.result == 'success' && '✅ Pass' || '❌ Fail' }} |"
            echo "| Docker build | ${{ needs.docker.result == 'success' && '✅ Pass' || '❌ Fail' }} |"
            echo "| Security scan | ${{ needs.security.result == 'success' && '✅ Completed' || '⚠️ Review' }} |"
            echo
            echo "**Commit:** ${{ github.sha }}"
            echo "**Branch:** ${{ github.ref_name }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail pipeline when a blocking gate fails
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
