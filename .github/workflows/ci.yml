name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ================================
  # 预部署检查 (最先运行)
  # ================================
  pre-deploy:
    name: Pre-deploy Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Make script executable
      run: chmod +x scripts/pre-deploy-check.sh

    - name: Run pre-deploy checks
      run: ./scripts/pre-deploy-check.sh
      continue-on-error: false

    - name: Upload check results
      if: always()
      run: |
        echo "## Pre-deploy Check Results" >> $GITHUB_STEP_SUMMARY
        echo "✅ All configuration checks passed" >> $GITHUB_STEP_SUMMARY

  # ================================
  # Go 后端 CI
  # ================================
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    needs: pre-deploy
    defaults:
      run:
        working-directory: server

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true
        cache-dependency-path: server/go.sum

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Build
      run: go build -v ./...

    - name: Run all tests
      run: go test -v -coverprofile=coverage.out -covermode=atomic ./...
      
    - name: Run race detector (non-blocking)
      run: go test -race ./... || echo "Race detector found issues, but not blocking CI"
      continue-on-error: true

    - name: Run WebSocket Origin tests (critical)
      run: go test -v ./internal/network/... -run "Origin|Deployment"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./server/coverage.out
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false

    - name: Generate coverage report
      run: |
        echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        go tool cover -func=coverage.out >> $GITHUB_STEP_SUMMARY

  # ================================
  # 前端 CI
  # ================================
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    needs: pre-deploy
    defaults:
      run:
        working-directory: client

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: client/package-lock.json

    - name: Install dependencies
      run: npm ci --include=dev
      env:
        NODE_ENV: development

    - name: Run all tests with coverage
      run: npm test -- --run --coverage
      env:
        NODE_ENV: development

    - name: Run connection tests (critical)
      run: npm test -- --run tests/connection.test.js

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./client/coverage/coverage-final.json
        flags: frontend
        name: frontend-coverage
        fail_ci_if_error: false

    - name: Generate coverage summary
      run: |
        echo "## Frontend Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f coverage/coverage-summary.json ]; then
          cat coverage/coverage-summary.json >> $GITHUB_STEP_SUMMARY
        else
          echo "Coverage report generated" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Check JavaScript syntax
      run: |
        npm install -g acorn
        for file in js/*.js; do
          acorn --silent "$file" > /dev/null || echo "Syntax error in $file"
        done
      continue-on-error: true

  # ================================
  # 代码质量检查
  # ================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: pre-deploy
    defaults:
      run:
        working-directory: server

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.11.3
        working-directory: server
        args: --timeout=5m

  # ================================
  # Docker 构建
  # ================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend, lint]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: fps-game:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Docker image ready
      run: |
        echo "## Docker Build" >> $GITHUB_STEP_SUMMARY
        echo "✅ Image built: fps-game:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ================================
  # 安全检查
  # ================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: pre-deploy
    defaults:
      run:
        working-directory: server

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Run Gosec Security Scanner
      uses: securego/gosec@master
      with:
        args: ./...
      continue-on-error: true

  # ================================
  # 最终报告
  # ================================
  report:
    name: CI Report
    runs-on: ubuntu-latest
    needs: [backend, frontend, lint, docker, security]
    if: always()

    steps:
    - name: Generate report
      run: |
        echo "## CI Pipeline Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Pre-deploy | ${{ needs.pre-deploy.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Backend | ${{ needs.backend.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Frontend | ${{ needs.frontend.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Lint | ${{ needs.lint.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Docker | ${{ needs.docker.result == 'success' && '✅ Pass' || '❌ Fail' }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security | ${{ needs.security.result == 'success' && '✅ Pass' || '⚠️ Warnings' }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

    - name: Check overall status
      if: contains(needs.*.result, 'failure')
      run: exit 1
